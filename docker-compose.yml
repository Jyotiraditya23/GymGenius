services:

  mysql:
    image: mysql:8
    container_name: fitness-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Jyoti@23
      MYSQL_DATABASE: fitness
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      timeout: 5s

  backend:
    build: ./FitnessWebSpringboot
    container_name: fitness-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fitness
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Jyoti@23
    ports:
      - "8080:8080"