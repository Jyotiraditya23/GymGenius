apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: backend
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: backend
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: backend
    spec:
      containers:
        - env:
            - name: SPRING_DATASOURCE_PASSWORD
              value: "Jyoti@23"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/fitness
            - name: SPRING_DATASOURCE_USERNAME
              value: root
          image: joebits/springboot-backend:latest
          name: fitness-backend
          ports:
            - containerPort: 8080
              protocol: TCP
      restartPolicy: Always
